<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HappiStream — твоя видеоплатформа</title>
    <style>
        /* Стили без изменений (можно оставить как есть) */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background: #f5f5f5;
            color: #333;
        }
        header {
            background: #6200ee;
            color: white;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        .logo {
            font-size: 2rem;
            font-weight: bold;
            letter-spacing: -1px;
        }
        nav a {
            color: white;
            margin: 0 1rem;
            text-decoration: none;
            font-weight: 500;
            transition: opacity 0.2s;
        }
        nav a:hover {
            opacity: 0.8;
        }
        #authButtons button {
            background: white;
            color: #6200ee;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            margin-left: 0.5rem;
        }
        main {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 1rem;
        }
        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
            margin-top: 1rem;
        }
        .video-card {
            background: white;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            cursor: pointer;
            transition: transform 0.2s;
        }
        .video-card:hover {
            transform: scale(1.02);
        }
        .video-card video {
            width: 100%;
            height: 160px;
            object-fit: cover;
            background: #000;
        }
        .video-info {
            padding: 0.8rem;
        }
        .video-info strong {
            font-size: 1.1rem;
            display: block;
            margin-bottom: 0.3rem;
        }
        .video-info span {
            color: #666;
            font-size: 0.9rem;
        }
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            position: relative;
        }
        .close {
            position: absolute;
            right: 1.5rem;
            top: 1rem;
            font-size: 1.8rem;
            cursor: pointer;
        }
        .modal-content input {
            width: 100%;
            padding: 0.8rem;
            margin: 0.5rem 0;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 1rem;
        }
        .modal-content button {
            width: 100%;
            padding: 0.8rem;
            margin: 0.5rem 0;
            border: none;
            border-radius: 4px;
            font-size: 1rem;
            cursor: pointer;
        }
        #nicknameLogin, #registerBtn {
            background: #6200ee;
            color: white;
            font-weight: 600;
        }
        #uploadForm, #manualUrlForm {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            max-width: 600px;
            margin: 1rem auto;
        }
        #uploadForm input, #uploadForm textarea, #manualUrlForm input, #manualUrlForm textarea {
            width: 100%;
            padding: 0.8rem;
            margin: 0.5rem 0;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 1rem;
        }
        #uploadForm button, #manualUrlForm button {
            background: #6200ee;
            color: white;
            border: none;
            padding: 1rem 2rem;
            font-size: 1.1rem;
            border-radius: 4px;
            cursor: pointer;
            margin-top: 1rem;
        }
        #uploadProgress {
            margin-top: 1rem;
            font-weight: bold;
            color: #6200ee;
        }
        .tab-buttons {
            display: flex;
            gap: 1rem;
            margin-bottom: 1rem;
        }
        .tab-button {
            background: #e0e0e0;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
        }
        .tab-button.active {
            background: #6200ee;
            color: white;
        }
        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
        }
        #likeBtn, #subscribeBtn {
            background: #6200ee;
            color: white;
            border: none;
            padding: 0.8rem 1.5rem;
            font-size: 1rem;
            border-radius: 4px;
            cursor: pointer;
            margin-right: 1rem;
            margin-top: 1rem;
        }
        #comments {
            margin: 2rem 0;
            max-height: 400px;
            overflow-y: auto;
            background: white;
            padding: 1rem;
            border-radius: 8px;
        }
        #commentInput {
            width: 100%;
            padding: 0.8rem;
            border: 1px solid #ccc;
            border-radius: 4px;
            margin-bottom: 0.5rem;
        }
        #sendComment {
            background: #6200ee;
            color: white;
            border: none;
            padding: 0.8rem 1.5rem;
            border-radius: 4px;
            cursor: pointer;
        }
        @media (max-width: 600px) {
            header {
                flex-direction: column;
                text-align: center;
            }
            nav {
                margin: 1rem 0;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">HappiStream</div>
        <nav>
            <a href="?page=feed">Главная</a>
            <a href="?page=upload">Загрузить</a>
            <a href="?page=profile" id="profileLink">Профиль</a>
        </nav>
        <div id="authButtons">
            <button id="loginBtn">Войти</button>
            <button id="logoutBtn" style="display:none;">Выйти</button>
        </div>
    </header>

    <main id="mainContent">
        <p style="text-align:center;">Загрузка...</p>
    </main>

    <!-- Модалка входа по нику -->
    <div id="loginModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h3>Вход / Регистрация по нику</h3>
            <input type="text" id="nickname" placeholder="Ник (только латиница и цифры)" pattern="[A-Za-z0-9]+" title="Только латинские буквы и цифры">
            <input type="password" id="password" placeholder="Пароль">
            <button id="nicknameLogin">Войти</button>
            <button id="registerBtn">Зарегистрироваться</button>
            <p style="font-size:0.9em; color:#666;">Регистрация: придумай ник и пароль</p>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <script>
        // ================== ТВОЙ КОНФИГ FIREBASE ==================
        const firebaseConfig = {
            apiKey: "AIzaSyCTLYurA-bERZEWOB92WhhXEhh0EpokjiM",
            authDomain: "happistream-acf61.firebaseapp.com",
            projectId: "happistream-acf61",
            storageBucket: "happistream-acf61.firebasestorage.app",
            messagingSenderId: "159613463671",
            appId: "1:159613463671:web:f1095bd2ad0e2259e9aa72",
            measurementId: "G-D1PK3CX7YY"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // ================== ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ ==================
        let currentUser = null;
        let currentVideoId = null;

        // ================== ОТСЛЕЖИВАНИЕ СОСТОЯНИЯ АУТЕНТИФИКАЦИИ ==================
        auth.onAuthStateChanged(user => {
            currentUser = user;
            updateUI();
            handlePageLoad();
        });

        function updateUI() {
            const loginBtn = document.getElementById('loginBtn');
            const logoutBtn = document.getElementById('logoutBtn');
            const profileLink = document.getElementById('profileLink');
            if (currentUser) {
                loginBtn.style.display = 'none';
                logoutBtn.style.display = 'inline-block';
                profileLink.href = `?page=profile&uid=${currentUser.uid}`;
            } else {
                loginBtn.style.display = 'inline-block';
                logoutBtn.style.display = 'none';
                profileLink.href = `?page=profile`;
            }
        }

        // ================== МОДАЛКА ВХОДА (НИК + ПАРОЛЬ) ==================
        const modal = document.getElementById('loginModal');
        document.getElementById('loginBtn').onclick = () => modal.style.display = 'flex';
        document.querySelector('.close').onclick = () => modal.style.display = 'none';
        window.onclick = (e) => { if (e.target === modal) modal.style.display = 'none'; };

        function nicknameToEmail(nickname) {
            return nickname.trim() + '@happistream.local';
        }

        document.getElementById('nicknameLogin').onclick = async () => {
            const nickname = document.getElementById('nickname').value.trim();
            const password = document.getElementById('password').value;
            if (!nickname || !password) {
                alert('Введи ник и пароль');
                return;
            }
            const email = nicknameToEmail(nickname);
            try {
                await auth.signInWithEmailAndPassword(email, password);
                modal.style.display = 'none';
                document.getElementById('nickname').value = '';
                document.getElementById('password').value = '';
            } catch (error) {
                alert('Ошибка входа: ' + error.message);
            }
        };

        document.getElementById('registerBtn').onclick = async () => {
            const nickname = document.getElementById('nickname').value.trim();
            const password = document.getElementById('password').value;
            if (!nickname || !password) {
                alert('Введи ник и пароль');
                return;
            }
            if (!/^[A-Za-z0-9]+$/.test(nickname)) {
                alert('Ник должен содержать только латинские буквы и цифры');
                return;
            }
            const email = nicknameToEmail(nickname);
            try {
                await auth.createUserWithEmailAndPassword(email, password);
                await auth.currentUser.updateProfile({ displayName: nickname });
                modal.style.display = 'none';
                document.getElementById('nickname').value = '';
                document.getElementById('password').value = '';
            } catch (error) {
                alert('Ошибка регистрации: ' + error.message);
            }
        };

        document.getElementById('logoutBtn').onclick = () => auth.signOut();

        // ================== ФУНКЦИЯ ЗАГРУЗКИ ВИДЕО (через pomf2.lain.la) ==================
        async function uploadVideo(file) {
            const formData = new FormData();
            formData.append('files[]', file);

            const response = await fetch('https://pomf2.lain.la/upload.php', {
                method: 'POST',
                body: formData
            });

            if (!response.ok) {
                throw new Error('Ошибка сети при загрузке');
            }

            const data = await response.json();
            if (data.success && data.files && data.files.length > 0) {
                return data.files[0].url; // прямая ссылка на видео
            } else {
                throw new Error('Не удалось получить ссылку на видео');
            }
        }

        // ================== РОУТИНГ ==================
        function handlePageLoad() {
            const params = new URLSearchParams(window.location.search);
            const page = params.get('page') || 'feed';
            const main = document.getElementById('mainContent');

            switch (page) {
                case 'upload':
                    renderUploadPage(main);
                    break;
                case 'video':
                    const videoId = params.get('id');
                    if (videoId) {
                        renderVideoPage(main, videoId);
                    } else {
                        window.location.href = '?page=feed';
                    }
                    break;
                case 'profile':
                    const uid = params.get('uid') || (currentUser ? currentUser.uid : null);
                    renderProfilePage(main, uid);
                    break;
                default:
                    renderFeedPage(main);
            }
        }

        // ================== ЛЕНТА ==================
        async function renderFeedPage(container) {
            container.innerHTML = '<h2>Лента видео</h2><div id="videoFeed" class="video-grid"></div>';
            const feed = document.getElementById('videoFeed');
            const snapshot = await db.collection('videos').orderBy('createdAt', 'desc').get();
            if (snapshot.empty) {
                feed.innerHTML = '<p>Пока нет видео. Загрузи первым!</p>';
                return;
            }
            snapshot.forEach(doc => {
                const v = doc.data();
                let authorName = v.userName;
                if (authorName && authorName.includes('@')) {
                    authorName = authorName.split('@')[0];
                }
                const card = document.createElement('div');
                card.className = 'video-card';
                card.onclick = () => window.location.href = `?page=video&id=${doc.id}`;
                card.innerHTML = `
                    <video src="${v.url}" preload="metadata"></video>
                    <div class="video-info">
                        <strong>${v.title}</strong>
                        <span>${authorName || 'Аноним'} • 👍 ${v.likes || 0}</span>
                    </div>
                `;
                feed.appendChild(card);
            });
        }

        // ================== СТРАНИЦА ЗАГРУЗКИ ==================
        function renderUploadPage(container) {
            if (!currentUser) {
                container.innerHTML = '<p>Войдите, чтобы загружать видео.</p>';
                return;
            }
            container.innerHTML = `
                <h2>Загрузить новое видео</h2>
                <div class="tab-buttons">
                    <button class="tab-button active" id="tabFileBtn">Загрузить файл</button>
                    <button class="tab-button" id="tabUrlBtn">Вставить ссылку</button>
                </div>
                <div id="tabFile" class="tab-content active">
                    <form id="uploadForm">
                        <p style="color: #666;">Максимальный размер файла: 1 ГБ. После загрузки видео появится в ленте.</p>
                        <input type="text" id="videoTitle" placeholder="Название видео" required>
                        <textarea id="videoDesc" placeholder="Описание" rows="4"></textarea>
                        <input type="file" id="videoFile" accept="video/*" required>
                        <button type="submit">Опубликовать</button>
                    </form>
                    <div id="uploadProgress"></div>
                </div>
                <div id="tabUrl" class="tab-content">
                    <form id="manualUrlForm">
                        <p style="color: #666;">Вставьте прямую ссылку на видео (например, с YouTube, Vimeo, или другого хостинга). Видео должно быть доступно для встраивания.</p>
                        <input type="text" id="videoUrl" placeholder="https://... .mp4 или ссылка на YouTube" required>
                        <input type="text" id="videoTitleUrl" placeholder="Название видео" required>
                        <textarea id="videoDescUrl" placeholder="Описание" rows="4"></textarea>
                        <button type="submit">Опубликовать</button>
                    </form>
                </div>
            `;

            // Переключение вкладок
            document.getElementById('tabFileBtn').onclick = () => {
                document.getElementById('tabFile').classList.add('active');
                document.getElementById('tabUrl').classList.remove('active');
                document.getElementById('tabFileBtn').classList.add('active');
                document.getElementById('tabUrlBtn').classList.remove('active');
            };
            document.getElementById('tabUrlBtn').onclick = () => {
                document.getElementById('tabUrl').classList.add('active');
                document.getElementById('tabFile').classList.remove('active');
                document.getElementById('tabUrlBtn').classList.add('active');
                document.getElementById('tabFileBtn').classList.remove('active');
            };

            // Обработчик загрузки файла
            document.getElementById('uploadForm').onsubmit = async (e) => {
                e.preventDefault();
                const file = document.getElementById('videoFile').files[0];
                const title = document.getElementById('videoTitle').value;
                const desc = document.getElementById('videoDesc').value;

                if (!file || !title) return alert('Заполните все поля');

                if (file.size > 1024 * 1024 * 1024) { // 1 ГБ
                    alert('Файл слишком большой! Максимум 1 ГБ.');
                    return;
                }

                try {
                    document.getElementById('uploadProgress').innerText = 'Загрузка видео... (может занять время)';

                    const videoURL = await uploadVideo(file);

                    document.getElementById('uploadProgress').innerText = 'Сохранение в базу данных...';

                    await db.collection('videos').add({
                        title,
                        description: desc,
                        url: videoURL,
                        userId: currentUser.uid,
                        userName: currentUser.displayName || currentUser.email,
                        likes: 0,
                        createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    });

                    alert('Видео опубликовано!');
                    window.location.href = '?page=feed';
                } catch (error) {
                    alert('Ошибка загрузки: ' + error.message);
                    document.getElementById('uploadProgress').innerText = '';
                }
            };

            // Обработчик ручного ввода ссылки
            document.getElementById('manualUrlForm').onsubmit = async (e) => {
                e.preventDefault();
                const url = document.getElementById('videoUrl').value.trim();
                const title = document.getElementById('videoTitleUrl').value.trim();
                const desc = document.getElementById('videoDescUrl').value.trim();

                if (!url || !title) return alert('Заполните название и ссылку');

                try {
                    await db.collection('videos').add({
                        title,
                        description: desc,
                        url: url,
                        userId: currentUser.uid,
                        userName: currentUser.displayName || currentUser.email,
                        likes: 0,
                        createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    });

                    alert('Видео добавлено!');
                    window.location.href = '?page=feed';
                } catch (error) {
                    alert('Ошибка сохранения: ' + error.message);
                }
            };
        }

        // ================== СТРАНИЦА ВИДЕО ==================
        async function renderVideoPage(container, videoId) {
            currentVideoId = videoId;
            const doc = await db.collection('videos').doc(videoId).get();
            if (!doc.exists) {
                container.innerHTML = '<p>Видео не найдено</p>';
                return;
            }
            const video = doc.data();

            let authorName = video.userName;
            if (authorName && authorName.includes('@')) {
                authorName = authorName.split('@')[0];
            }

            container.innerHTML = `
                <video src="${video.url}" controls style="width:100%; max-height:500px; background:#000;"></video>
                <h2>${video.title}</h2>
                <p>${video.description || ''}</p>
                <div>Автор: <a href="?page=profile&uid=${video.userId}" style="color:#6200ee;">${authorName || 'Аноним'}</a></div>
                <div>
                    <button id="likeBtn">👍 Лайк (${video.likes || 0})</button>
                    <button id="subscribeBtn">${currentUser ? 'Подписаться' : 'Войдите, чтобы подписаться'}</button>
                </div>
                <h3>Комментарии</h3>
                <div id="comments"></div>
                <textarea id="commentInput" placeholder="Напишите комментарий..." rows="2"></textarea>
                <button id="sendComment">Отправить</button>
            `;

            document.getElementById('likeBtn').onclick = async () => {
                if (!currentUser) return alert('Войдите');
                const likeRef = db.collection('likes').doc(`${currentUser.uid}_${videoId}`);
                const likeDoc = await likeRef.get();
                if (likeDoc.exists) {
                    await likeRef.delete();
                    await db.collection('videos').doc(videoId).update({
                        likes: firebase.firestore.FieldValue.increment(-1)
                    });
                } else {
                    await likeRef.set({ userId: currentUser.uid, videoId });
                    await db.collection('videos').doc(videoId).update({
                        likes: firebase.firestore.FieldValue.increment(1)
                    });
                }
                const likeBtn = document.getElementById('likeBtn');
                const currentLikes = parseInt(likeBtn.innerText.match(/\d+/)[0]) || 0;
                const newLikes = likeDoc.exists ? currentLikes - 1 : currentLikes + 1;
                likeBtn.innerText = `👍 Лайк (${newLikes})`;
            };

            document.getElementById('subscribeBtn').onclick = async () => {
                if (!currentUser) return alert('Войдите');
                if (currentUser.uid === video.userId) return alert('Нельзя подписаться на себя');
                const subRef = db.collection('subscriptions').doc(`${currentUser.uid}_${video.userId}`);
                const subDoc = await subRef.get();
                if (subDoc.exists) {
                    await subRef.delete();
                    alert('Вы отписались');
                } else {
                    await subRef.set({ followerId: currentUser.uid, followedId: video.userId });
                    alert('Вы подписались');
                }
            };

            async function loadComments() {
                const commentsDiv = document.getElementById('comments');
                const snapshot = await db.collection('comments')
                    .where('videoId', '==', videoId)
                    .orderBy('createdAt', 'desc')
                    .get();
                commentsDiv.innerHTML = snapshot.docs.map(d => {
                    const c = d.data();
                    let commenterName = c.userName;
                    if (commenterName && commenterName.includes('@')) {
                        commenterName = commenterName.split('@')[0];
                    }
                    return `<p><strong>${commenterName}:</strong> ${c.text}</p>`;
                }).join('');
            }
            loadComments();

            document.getElementById('sendComment').onclick = async () => {
                const text = document.getElementById('commentInput').value;
                if (!currentUser || !text) return;
                await db.collection('comments').add({
                    videoId,
                    userId: currentUser.uid,
                    userName: currentUser.displayName || currentUser.email,
                    text,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                document.getElementById('commentInput').value = '';
                loadComments();
            };
        }

        // ================== ПРОФИЛЬ ==================
        async function renderProfilePage(container, uid) {
            if (!uid) {
                container.innerHTML = '<p>Пользователь не указан.</p>';
                return;
            }

            let userNickname = 'Аноним';
            if (currentUser && currentUser.uid === uid) {
                userNickname = currentUser.displayName || currentUser.email.split('@')[0];
            } else {
                const firstVideo = await db.collection('videos').where('userId', '==', uid).limit(1).get();
                if (!firstVideo.empty) {
                    const rawName = firstVideo.docs[0].data().userName;
                    userNickname = rawName && rawName.includes('@') ? rawName.split('@')[0] : rawName || 'Аноним';
                }
            }

            const subsSnapshot = await db.collection('subscriptions').where('followedId', '==', uid).get();
            const subscribers = subsSnapshot.size;

            const videosSnapshot = await db.collection('videos').where('userId', '==', uid).orderBy('createdAt', 'desc').get();
            const videos = videosSnapshot.docs;

            container.innerHTML = `
                <h2>Профиль ${userNickname}</h2>
                <p>Подписчиков: ${subscribers}</p>
                <h3>Видео пользователя</h3>
                <div id="userVideos" class="video-grid"></div>
            `;

            const grid = document.getElementById('userVideos');
            if (videos.length === 0) {
                grid.innerHTML = '<p>У этого пользователя пока нет видео.</p>';
                return;
            }
            videos.forEach(doc => {
                const v = doc.data();
                const card = document.createElement('div');
                card.className = 'video-card';
                card.onclick = () => window.location.href = `?page=video&id=${doc.id}`;
                card.innerHTML = `
                    <video src="${v.url}" preload="metadata"></video>
                    <div class="video-info">
                        <strong>${v.title}</strong>
                        <span>👍 ${v.likes || 0}</span>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        window.addEventListener('popstate', handlePageLoad);
        window.addEventListener('load', handlePageLoad);
    </script>
</body>
</html>
